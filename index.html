<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>

    <!-- Мгновенный редирект -->
    <meta http-equiv="refresh" content="0; url=https://example.com/" />

    <!-- На всякий случай для поисковиков -->
    <link rel="canonical" href="https://example.com/" />

    <script>
      window.location.replace("https://example.com/");
    </script>
  </head>
  <body>
    <p>
      Перенаправляем...
      <a href="https://example.com/">Нажмите сюда, если редирект не сработал</a>.
    </p>
  </body>
</html>
